<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文獻解讀 • 鯨魚爸醫學教育平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
    body { font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif; }
    .nav-active { color: #0f766e; font-weight: 600; }
    .dataview-table { border-collapse: collapse; }
    .dataview-table th { font-weight: 500; color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .dataview-row { transition: background 0.1s ease; }
    .dataview-row:hover { background: #f8fafc; }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-800">
  <!-- Navigation -->
  <nav class="bg-white border-b border-zinc-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-x-3">
          <div class="w-9 h-9 bg-teal-700 rounded-xl flex items-center justify-center">
            <span class="text-white text-xl font-semibold tracking-tighter">鯨</span>
          </div>
          <div>
            <div class="font-semibold text-xl tracking-tight">鯨魚爸</div>
            <div class="text-[10px] text-zinc-500 -mt-1">醫學教育平台</div>
          </div>
        </div>
        <div class="flex items-center gap-x-8 text-sm">
          <a href="index.html" class="hover:text-teal-700 transition-colors">首頁</a>
          <a href="literature.html" class="nav-active">文獻解讀</a>
          <a href="patient-edu.html" class="hover:text-teal-700 transition-colors">病患衛教</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-6 pt-12 pb-8">
    <div class="flex items-end justify-between mb-6">
      <div>
        <div class="text-xs uppercase tracking-[2px] text-teal-700 font-medium">CATEGORY</div>
        <h1 class="text-4xl font-semibold tracking-tight">文獻解讀</h1>
      </div>
      <div class="text-sm text-zinc-500">自動同步 GitHub 資料夾內容</div>
    </div>

    <!-- Dataview-style Table -->
    <div class="bg-white border border-zinc-200 rounded-3xl overflow-hidden">
      <table class="w-full dataview-table">
        <thead>
          <tr class="border-b border-zinc-200 bg-zinc-50">
            <th class="text-left px-8 py-4">文獻標題</th>
            <th class="text-left px-4 py-4">疾病</th>
            <th class="text-right px-8 py-4">操作</th>
          </tr>
        </thead>
        <tbody id="file-list" class="text-sm divide-y divide-zinc-100">
          <tr id="loading-row">
            <td colspan="3" class="px-8 py-8 text-center text-zinc-500">
              <i class="fa-solid fa-spinner fa-spin mr-2"></i>載入文獻列表並分析疾病…
            </td>
          </tr>
        </tbody>
      </table>
      <div id="empty-state" class="hidden px-8 py-12 text-center text-sm text-zinc-500">
        目前尚無內容。請將 HTML 檔案上傳至 <code class="font-mono bg-zinc-100 px-1.5 py-px rounded">/literature</code> 資料夾後重新整理。
      </div>
    </div>

    <div class="mt-4 text-xs text-zinc-500 flex items-center gap-x-2">
      <i class="fa-solid fa-info-circle"></i>
      <span>新增或更新檔案後，重新整理本頁即可自動顯示最新列表。</span>
    </div>
  </div>

  <footer class="max-w-5xl mx-auto px-6 py-8 text-center text-xs text-zinc-500 border-t border-zinc-200">
    © 鯨魚爸醫學教育平台
  </footer>

  <script>
    const DISEASE_LEXICON = [
      { label: '類風濕性關節炎', patterns: [/rheumatoid\s+arthritis/i, /(?:patients?|subjects?|participants?|people)\s+with\s+ra\b/i, /\bra\s+patients?\b/i, /newly\s+diagnosed\s+ra\b/i, /incident\s+ra\b/i, /類風濕性關節炎/, /类风湿关节炎/] },
      { label: '乾癬性關節炎', patterns: [/psoriatic\s+arthritis/i, /\bpsa\b/i, /乾癬性關節炎/] },
      { label: '僵直性脊椎炎', patterns: [/ankylosing\s+spondylitis/i, /僵直性脊椎炎/] },
      { label: '全身性紅斑性狼瘡', patterns: [/systemic\s+lupus/i, /\bsle\b/i, /lupus\s+erythematosus/i, /全身性紅斑性狼瘡/, /紅斑性狼瘡/] },
      { label: '痛風', patterns: [/\bgout\b/i, /痛風/] },
      { label: '骨關節炎', patterns: [/osteoarthritis/i, /骨關節炎/] },
      { label: '骨質疏鬆症', patterns: [/osteoporosis/i, /骨質疏鬆/] },
      { label: '乾癬', patterns: [/\bpsoriasis\b/i, /乾癬(?!性)/] },
      { label: '發炎性腸道疾病', patterns: [/inflammatory\s+bowel/i, /\bibd\b/i, /crohn/i, /ulcerative\s+colitis/i, /發炎性腸道/] },
      { label: '血管炎', patterns: [/vasculitis/i, /血管炎/] },
      { label: '乾燥症', patterns: [/sj[oö]gren/i, /乾燥症/] },
      { label: '硬皮症', patterns: [/scleroderma/i, /systemic\s+sclerosis/i, /硬皮症/] },
      { label: '皮肌炎／多發性肌炎', patterns: [/dermatomyositis/i, /polymyositis/i, /皮肌炎/, /多發性肌炎/] },
      { label: '巨細胞動脈炎', patterns: [/giant\s+cell\s+arteritis/i, /temporal\s+arteritis/i, /巨細胞動脈炎/] },
      { label: '風濕性多發性肌痛', patterns: [/polymyalgia\s+rheumatica/i, /風濕性多發性肌痛/] },
      { label: '纖維肌痛', patterns: [/fibromyalgia/i, /纖維肌痛/] },
      { label: '心血管疾病', patterns: [/major\s+adverse\s+cardiovascular/i, /\bmace\b/i, /cardiovascular\s+(?:events?|disease|mortality|risk)/i, /心血管疾病/] },
      { label: '高血壓', patterns: [/hypertension/i, /高血壓/] },
      { label: '糖尿病', patterns: [/diabetes(?:\s+mellitus)?/i, /糖尿病/] },
      { label: '缺血性心臟病', patterns: [/ischemic\s+heart\s+disease/i, /coronary\s+(?:artery\s+)?disease/i, /缺血性心臟病/] },
    ];

    const RHEUMATIC_DISEASES = DISEASE_LEXICON.slice(0, 15);
    const COMORBIDITY_DISEASES = DISEASE_LEXICON.slice(15);

    function collectStudyText(doc) {
      const chunks = [];
      const h1 = doc.querySelector('h1');
      if (h1) chunks.push(h1.textContent);

      ['snapshot', 'appraisal'].forEach(id => {
        const section = doc.getElementById(id);
        if (section) chunks.push(section.textContent);
      });

      doc.querySelectorAll('.verbatim, .analysis-text').forEach(el => {
        chunks.push(el.textContent);
      });

      return chunks.join('\n');
    }

    function collectPrimaryContext(doc) {
      const chunks = [];
      const h1 = doc.querySelector('h1');
      if (h1) chunks.push(h1.textContent);
      doc.querySelectorAll('.verbatim').forEach((el, i) => {
        if (i < 4) chunks.push(el.textContent);
      });
      return chunks.join('\n');
    }

    function matchDiseases(text, lexicon) {
      const found = [];
      for (const { label, patterns } of lexicon) {
        if (patterns.some(p => p.test(text))) found.push(label);
      }
      return found;
    }

    function extractDiseases(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const meta = doc.querySelector('meta[name="article-disease"]');
      if (meta?.content?.trim()) {
        return meta.content.split(/[,，、]/).map(s => s.trim()).filter(Boolean);
      }

      const fullText = collectStudyText(doc);
      const primaryContext = collectPrimaryContext(doc);
      const rheumatic = matchDiseases(fullText, RHEUMATIC_DISEASES);
      const comorbidities = matchDiseases(primaryContext, COMORBIDITY_DISEASES);
      return [...new Set([...rheumatic, ...comorbidities])];
    }

    function renderDiseaseTags(diseases) {
      if (!diseases.length) {
        return '<span class="text-zinc-400 text-xs">—</span>';
      }
      return diseases.map(d =>
        `<span class="inline-block px-2.5 py-0.5 mr-1 mb-1 bg-teal-50 text-teal-800 text-xs font-medium rounded-full border border-teal-100">${d}</span>`
      ).join('');
    }

    async function loadLiterature() {
      const tbody = document.getElementById('file-list');
      const empty = document.getElementById('empty-state');
      empty.classList.add('hidden');

      try {
        const res = await fetch('https://api.github.com/repos/jingyuba/jingyuba.github.io/contents/literature');
        if (!res.ok) throw new Error('無法取得資料');

        const files = await res.json();
        const htmlFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.html'));

        if (htmlFiles.length === 0) {
          tbody.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }

        const rows = await Promise.all(htmlFiles.map(async file => {
          const title = file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
          let diseases = [];
          try {
            const contentRes = await fetch(`literature/${encodeURIComponent(file.name)}`);
            if (contentRes.ok) {
              const html = await contentRes.text();
              diseases = extractDiseases(html);
            }
          } catch (_) { /* keep empty diseases */ }
          return { title, fileName: file.name, diseases };
        }));

        tbody.innerHTML = '';
        rows.forEach(({ title, fileName, diseases }) => {
          const row = document.createElement('tr');
          row.className = 'dataview-row';
          row.innerHTML = `
            <td class="px-8 py-4 font-medium max-w-md">${title}</td>
            <td class="px-4 py-4">${renderDiseaseTags(diseases)}</td>
            <td class="px-8 py-4 text-right whitespace-nowrap">
              <a href="literature/${fileName}"
                 class="inline-flex items-center gap-x-1.5 text-teal-700 hover:text-teal-800 text-sm font-medium">
                閱讀 <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
              </a>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        tbody.innerHTML = '';
        empty.innerHTML = `無法載入列表：${err.message}。請確認網路連線或稍後再試。`;
        empty.classList.remove('hidden');
      }
    }

    loadLiterature();
  </script>
</body>
</html>
