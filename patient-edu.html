<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>病患衛教 • 鯨魚爸醫學教育平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
    body { font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif; }
    .nav-active { color: #b45309; font-weight: 600; }
    .dataview-table { border-collapse: collapse; }
    .dataview-table th { font-weight: 500; color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .dataview-row { transition: background 0.1s ease; }
    .dataview-row:hover { background: #fffbeb; }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-800">
  <!-- Navigation -->
  <nav class="bg-white border-b border-zinc-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-x-3">
          <div class="w-9 h-9 bg-amber-700 rounded-xl flex items-center justify-center">
            <span class="text-white text-xl font-semibold tracking-tighter">鯨</span>
          </div>
          <div>
            <div class="font-semibold text-xl tracking-tight">鯨魚爸</div>
            <div class="text-[10px] text-zinc-500 -mt-1">醫學教育平台</div>
          </div>
        </div>
        <div class="flex items-center gap-x-8 text-sm">
          <a href="index.html" class="hover:text-amber-700 transition-colors">首頁</a>
          <a href="literature.html" class="hover:text-amber-700 transition-colors">文獻解讀</a>
          <a href="patient-edu.html" class="nav-active">病患衛教</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-6 pt-12 pb-8">
    <div class="flex items-end justify-between mb-6">
      <div>
        <div class="text-xs uppercase tracking-[2px] text-amber-700 font-medium">CATEGORY</div>
        <h1 class="text-4xl font-semibold tracking-tight">病患衛教</h1>
      </div>
      <div class="text-sm text-zinc-500">自動同步 GitHub 資料夾內容</div>
    </div>

    <!-- Dataview-style Table -->
    <div class="bg-white border border-zinc-200 rounded-3xl overflow-hidden">
      <table class="w-full dataview-table">
        <thead>
          <tr class="border-b border-zinc-200 bg-zinc-50">
            <th class="text-left px-8 py-4">衛教主題</th>
            <th class="text-right px-8 py-4">操作</th>
          </tr>
        </thead>
        <tbody id="file-list" class="text-sm divide-y divide-zinc-100">
          <!-- Populated by JS -->
        </tbody>
      </table>
      <div id="empty-state" class="hidden px-8 py-12 text-center text-sm text-zinc-500">
        目前尚無內容。請將 HTML 檔案上傳至 <code class="font-mono bg-zinc-100 px-1.5 py-px rounded">/patient-edu</code> 資料夾後重新整理。
      </div>
    </div>

    <div class="mt-4 text-xs text-zinc-500 flex items-center gap-x-2">
      <i class="fa-solid fa-info-circle"></i>
      <span>新增或更新檔案後，重新整理本頁即可自動顯示最新列表。</span>
    </div>
  </div>

  <footer class="max-w-5xl mx-auto px-6 py-8 text-center text-xs text-zinc-500 border-t border-zinc-200">
    © 鯨魚爸醫學教育平台
  </footer>

  <script>
    async function loadPatientEdu() {
      const tbody = document.getElementById('file-list');
      const empty = document.getElementById('empty-state');
      tbody.innerHTML = '';
      empty.classList.add('hidden');

      try {
        const res = await fetch('https://api.github.com/repos/jingyuba/jingyuba.github.io/contents/patient-edu');
        if (!res.ok) throw new Error('無法取得資料');

        const files = await res.json();
        const htmlFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.html'));

        if (htmlFiles.length === 0) {
          empty.classList.remove('hidden');
          return;
        }

        htmlFiles.forEach(file => {
          const title = file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
          const row = document.createElement('tr');
          row.className = 'dataview-row';
          row.innerHTML = `
            <td class="px-8 py-4 font-medium">${title}</td>
            <td class="px-8 py-4 text-right">
              <a href="patient-edu/${file.name}" 
                 class="inline-flex items-center gap-x-1.5 text-amber-700 hover:text-amber-800 text-sm font-medium">
                閱讀 <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
              </a>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        empty.innerHTML = `無法載入列表：${err.message}。請確認網路連線或稍後再試。`;
        empty.classList.remove('hidden');
      }
    }

    loadPatientEdu();
  </script>
</body>
</html>
